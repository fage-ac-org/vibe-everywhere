name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "20"

jobs:
  verify:
    name: Verify Release Inputs
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup protoc
        uses: arduino/setup-protoc@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/vibe-app/package-lock.json

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: apps/vibe-app
        run: npm ci

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check workspace
        run: cargo check --locked -p vibe-relay -p vibe-agent -p vibe-app

      - name: Run workspace tests
        run: cargo test --locked --workspace --all-targets -- --nocapture

      - name: Build frontend
        working-directory: apps/vibe-app
        run: npm run build

      - name: Run relay polling smoke test
        run: ./scripts/dual-process-smoke.sh relay_polling

      - name: Run overlay smoke test (best effort)
        continue-on-error: true
        run: ./scripts/dual-process-smoke.sh overlay

  build-cli:
    name: Build CLI (${{ matrix.target }})
    needs: verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive_basename: vibe-remote-cli-x86_64-unknown-linux-gnu
            archive_name: vibe-remote-cli-x86_64-unknown-linux-gnu.tar.gz
            archive_format: gztar
            bin_ext: ""
          - os: macos-13
            target: x86_64-apple-darwin
            archive_basename: vibe-remote-cli-x86_64-apple-darwin
            archive_name: vibe-remote-cli-x86_64-apple-darwin.tar.gz
            archive_format: gztar
            bin_ext: ""
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            archive_basename: vibe-remote-cli-x86_64-pc-windows-msvc
            archive_name: vibe-remote-cli-x86_64-pc-windows-msvc.zip
            archive_format: zip
            bin_ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libdbus-1-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup protoc
        uses: arduino/setup-protoc@v3

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --locked --release -p vibe-relay -p vibe-agent

      - name: Package CLI archive
        shell: bash
        env:
          ARCHIVE_BASENAME: ${{ matrix.archive_basename }}
          ARCHIVE_NAME: ${{ matrix.archive_name }}
          ARCHIVE_FORMAT: ${{ matrix.archive_format }}
          BIN_EXT: ${{ matrix.bin_ext }}
        run: |
          set -euo pipefail
          staging_dir="$RUNNER_TEMP/$ARCHIVE_BASENAME"
          mkdir -p "$staging_dir"

          cp "target/release/vibe-relay$BIN_EXT" "$staging_dir/"
          cp "target/release/vibe-agent$BIN_EXT" "$staging_dir/"
          cp README.md README.en.md LICENSE "$staging_dir/"

          export STAGING_DIR="$staging_dir"
          export ARCHIVE_BASE_PATH="$GITHUB_WORKSPACE/$ARCHIVE_BASENAME"
          python - <<'PY'
          import os
          import shutil

          shutil.make_archive(
              os.environ["ARCHIVE_BASE_PATH"],
              os.environ["ARCHIVE_FORMAT"],
              os.environ["STAGING_DIR"],
          )
          PY

          test -f "$GITHUB_WORKSPACE/$ARCHIVE_NAME"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_basename }}
          path: ${{ github.workspace }}/${{ matrix.archive_name }}
          if-no-files-found: error
          retention-days: 14

  build-desktop:
    name: Build Desktop (${{ matrix.target }})
    needs: verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive_basename: vibe-remote-desktop-x86_64-unknown-linux-gnu
            archive_name: vibe-remote-desktop-x86_64-unknown-linux-gnu.tar.gz
            archive_format: gztar
          - os: macos-13
            target: x86_64-apple-darwin
            archive_basename: vibe-remote-desktop-x86_64-apple-darwin
            archive_name: vibe-remote-desktop-x86_64-apple-darwin.tar.gz
            archive_format: gztar
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            archive_basename: vibe-remote-desktop-x86_64-pc-windows-msvc
            archive_name: vibe-remote-desktop-x86_64-pc-windows-msvc.zip
            archive_format: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/vibe-app/package-lock.json

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: apps/vibe-app
        run: npm ci

      - name: Build Tauri desktop bundles
        working-directory: apps/vibe-app
        run: npm run tauri -- build

      - name: Package desktop archive
        shell: bash
        env:
          ARCHIVE_BASENAME: ${{ matrix.archive_basename }}
          ARCHIVE_NAME: ${{ matrix.archive_name }}
          ARCHIVE_FORMAT: ${{ matrix.archive_format }}
        run: |
          set -euo pipefail
          bundle_dir="$(find "$GITHUB_WORKSPACE" -type d -path '*/target/release/bundle' | head -n 1)"
          if [[ -z "$bundle_dir" ]]; then
            echo "Failed to locate Tauri bundle output" >&2
            exit 1
          fi

          staging_dir="$RUNNER_TEMP/$ARCHIVE_BASENAME"
          mkdir -p "$staging_dir"
          cp README.md README.en.md LICENSE "$staging_dir/"
          cp -R "$bundle_dir" "$staging_dir/bundle"

          export STAGING_DIR="$staging_dir"
          export ARCHIVE_BASE_PATH="$GITHUB_WORKSPACE/$ARCHIVE_BASENAME"
          python - <<'PY'
          import os
          import shutil

          shutil.make_archive(
              os.environ["ARCHIVE_BASE_PATH"],
              os.environ["ARCHIVE_FORMAT"],
              os.environ["STAGING_DIR"],
          )
          PY

          test -f "$GITHUB_WORKSPACE/$ARCHIVE_NAME"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_basename }}
          path: ${{ github.workspace }}/${{ matrix.archive_name }}
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release
    needs:
      - build-cli
      - build-desktop
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: vibe-remote-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/*
